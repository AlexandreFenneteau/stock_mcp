name: Infra - Terraform Plan/Apply

# Provisions the Azure resources (Entra ID apps, Static Web App, App Service
# Plan + Web Apps) BEFORE any application code is deployed. Run "apply" once
# manually (or merge to main) before the deploy-apps workflow can succeed.

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra-terraform.yml"
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC login to Azure
  contents: read
  pull-requests: write # required to post the plan as a PR comment

defaults:
  run:
    working-directory: infra

env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  # NOTE: must be the literal value matching the OIDC subject claim GitHub
  # actually sends (visible in a failed azure/login run's "subject claim"
  # log line) — NOT necessarily plain "owner/repo". Enterprise Managed User
  # (EMU) orgs append numeric suffixes, e.g. "owner@12345/repo@67890".
  TF_VAR_github_repository: ${{ vars.GH_REPOSITORY_OIDC_SUBJECT }}
  # Fixed object ID of the human owner of all Entra ID App Registrations
  # (see the admin_object_id variable in main.tf for why this must be a
  # stable value, not derived from whoever is running Terraform).
  TF_VAR_admin_object_id: ${{ vars.ADMIN_OBJECT_ID }}

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - run: terraform init

      - run: terraform fmt -check -recursive

      - run: terraform plan -no-color -out=tfplan
        id: plan

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan\n\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  apply:
    name: Terraform Apply
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: plan
    runs-on: ubuntu-latest
    environment: production # require a manual approval gate in repo settings
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - run: terraform init

      - run: terraform apply -auto-approve
